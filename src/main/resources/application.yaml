spring:
  application:
    name: smarterp-api
  
  profiles:
    active: prod
  
  datasource:
    url: jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:smarterp_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQLUSER:root}
    password: ${MYSQLPASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  
  flyway:
    enabled: false
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: ${JWT_SECRET:django-insecure-smarterp-clave-secreta-2024-abc123xyz}
  expiration: 86400000
  refresh-expiration: 604800000

app:
  upload:
    path: /app/uploads

logging:
  level:
    com.smarterp: INFO
    org.springframework.security: INFO
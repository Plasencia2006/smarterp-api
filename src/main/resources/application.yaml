spring:
  application:
    name: smarterp-api
  
  profiles:
    active: dev
  
  datasource:
    url: jdbc:mysql://localhost:3306/microservicios_smarterp
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  
  jpa:
    hibernate:
      ddl-auto: update
      show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  
  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true
  
  jackson:
    time-zone: UTC
  
  # ✅ UNIFICADO: Multipart dentro de spring
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: "django-insecure-smarterp-clave-secreta-2024-abc123xyz"
  expiration: 86400000
  refresh-expiration: 604800000

#  Configuración de uploads
app:
  upload:
    path: ./uploads

logging:
  level:
    com.smarterp: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG